<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Country Detail — PULPSCREEN</title>
<link rel="stylesheet" href="/nav.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0A0A0A;
  --black-card: #111;
  --black-border: #222;
  --orange: #FF6B2B;
  --pink: #FF2D7B;
  --gradient: linear-gradient(135deg, #FF6B2B 0%, #FF4757 50%, #FF2D7B 100%);
  --white: #FFF;
  --gray-100: #F5F5F5;
  --gray-300: #AAA;
  --gray-500: #666;
  --gray-700: #333;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--black); color: var(--white); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

.container { max-width: 960px; margin: 0 auto; padding: 100px 24px 60px; }

/* Country header */
.country-header { margin-bottom: 40px; }
.country-header h1 { font-family: var(--font-display); font-size: clamp(32px, 5vw, 48px); font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
.country-meta { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.meta-tag { padding: 4px 12px; border-radius: 20px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
.meta-tag.region { background: rgba(255,107,43,0.1); border: 1px solid rgba(255,107,43,0.25); color: var(--orange); }
.meta-tag.updated { background: rgba(255,255,255,0.04); border: 1px solid var(--black-border); color: var(--gray-500); }
.country-desc { color: var(--gray-300); font-size: 15px; line-height: 1.7; max-width: 640px; }

/* Section headers */
.section-header { display: flex; align-items: center; gap: 12px; margin: 48px 0 20px; }
.section-header h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; }
.section-count { font-family: var(--font-mono); font-size: 11px; color: var(--gray-500); letter-spacing: 1px; }

/* Programme cards */
.programme-card {
  background: var(--black-card);
  border: 1px solid var(--black-border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}
.programme-card:hover { border-color: rgba(255,107,43,0.3); }

.programme-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 12px;
}
.programme-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; flex: 1; }
.programme-rate {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

.programme-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.badge {
  padding: 3px 10px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.badge.category { background: rgba(255,107,43,0.1); color: var(--orange); }
.badge.format { background: rgba(255,255,255,0.04); color: var(--gray-500); }
.badge.status-active { background: rgba(76,175,80,0.1); color: #4CAF50; }
.badge.status-suspended { background: rgba(244,67,54,0.1); color: #F44336; }

.programme-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}
.programme-field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--gray-500);
  margin-bottom: 4px;
}
.programme-field .value {
  font-size: 13px;
  color: var(--gray-300);
  line-height: 1.5;
}

.programme-eligibility {
  font-size: 13px;
  color: var(--gray-300);
  line-height: 1.7;
  padding: 12px 16px;
  background: rgba(255,255,255,0.02);
  border-radius: 8px;
  margin-bottom: 12px;
}

.programme-links { display: flex; gap: 12px; flex-wrap: wrap; }
.programme-link {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--orange);
  text-decoration: none;
  transition: color 0.2s;
}
.programme-link:hover { color: var(--white); }

/* Region divider */
.region-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 40px 0 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--orange);
}
.region-divider::after { content: ''; flex: 1; height: 1px; background: var(--black-border); }

/* Filter tabs */
.filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-tab {
  padding: 6px 14px;
  background: transparent;
  border: 1px solid var(--black-border);
  border-radius: 20px;
  color: var(--gray-500);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-tab:hover { border-color: rgba(255,107,43,0.3); color: var(--gray-300); }
.filter-tab.active { background: rgba(255,107,43,0.12); border-color: rgba(255,107,43,0.4); color: var(--white); }

/* Country selector */
.country-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.country-btn {
  padding: 8px 16px;
  background: var(--black-card);
  border: 1px solid var(--black-border);
  border-radius: 8px;
  color: var(--gray-300);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.country-btn:hover { border-color: rgba(255,107,43,0.3); color: var(--white); }
.country-btn.active { border-color: var(--orange); color: var(--white); background: rgba(255,107,43,0.08); }

/* Responsive */
@media (max-width: 640px) {
  .programme-grid { grid-template-columns: 1fr; }
  .programme-header { flex-direction: column; gap: 8px; }
}
</style>
</head>
<body>

<div id="main-nav"></div>

<div class="container">
  <!-- Country selector -->
  <div class="country-selector">
    <a class="country-btn active" href="?country=france">🇫🇷 France</a>
    <a class="country-btn" href="?country=uk">🇬🇧 United Kingdom</a>
    <a class="country-btn" href="?country=germany">🇩🇪 Germany</a>
    <a class="country-btn" href="?country=canada">🇨🇦 Canada</a>
  </div>

  <!-- Country header (populated by JS) -->
  <div class="country-header" id="country-header">
    <h1 id="country-title">Loading...</h1>
    <div class="country-meta" id="country-meta"></div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs" id="filter-tabs">
    <button class="filter-tab active" data-filter="all">All Programmes</button>
    <button class="filter-tab" data-filter="national">National</button>
    <button class="filter-tab" data-filter="regional">Regional</button>
    <button class="filter-tab" data-filter="cash-rebate">Rebates</button>
    <button class="filter-tab" data-filter="tax-credit">Tax Credits</button>
    <button class="filter-tab" data-filter="grant">Grants</button>
  </div>

  <!-- Programme list (populated by JS) -->
  <div id="programme-list"></div>
</div>

<script src="/nav.js"></script>
<script>
const countryMap = {
  france: { file: '/data/france.json', flag: '🇫🇷', name: 'France', region: 'Western Europe' },
  uk: { file: '/data/uk.json', flag: '🇬🇧', name: 'United Kingdom', region: 'Western Europe' },
  germany: { file: '/data/germany.json', flag: '🇩🇪', name: 'Germany', region: 'Western Europe' },
  canada: { file: '/data/canada.json', flag: '🇨🇦', name: 'Canada', region: 'International Partner' },
};

const params = new URLSearchParams(window.location.search);
const countrySlug = params.get('country') || 'france';
const countryInfo = countryMap[countrySlug] || countryMap.france;

// Highlight active country button
document.querySelectorAll('.country-btn').forEach(btn => {
  if (btn.href.includes(countrySlug)) btn.classList.add('active');
  else btn.classList.remove('active');
});

let allProgrammes = [];

async function loadCountry() {
  try {
    const res = await fetch(countryInfo.file);
    const data = await res.json();
    allProgrammes = data.programmes;

    // Header
    document.getElementById('country-title').textContent = countryInfo.flag + ' ' + countryInfo.name;
    document.getElementById('country-meta').innerHTML = `
      <span class="meta-tag region">${countryInfo.region}</span>
      <span class="meta-tag updated">Updated: ${data.metadata?.lastUpdated || 'N/A'}</span>
      <span class="meta-tag updated">${allProgrammes.length} programmes</span>
    `;
    document.title = countryInfo.name + ' — Production Finance — PULPSCREEN';

    renderProgrammes('all');
  } catch (e) {
    document.getElementById('programme-list').innerHTML = '<p style="color:var(--gray-500);">Error loading data.</p>';
  }
}

function renderProgrammes(filter) {
  const list = document.getElementById('programme-list');
  list.innerHTML = '';

  let filtered = allProgrammes;
  if (filter === 'national') filtered = allProgrammes.filter(p => p.level === 'national');
  else if (filter === 'regional') filtered = allProgrammes.filter(p => p.level === 'regional');
  else if (filter === 'cash-rebate' || filter === 'tax-credit' || filter === 'grant')
    filtered = allProgrammes.filter(p => p.category === filter);

  // Group by level and region
  const national = filtered.filter(p => p.level === 'national');
  const regional = filtered.filter(p => p.level === 'regional');

  // Group regional by region name
  const regionGroups = {};
  regional.forEach(p => {
    const r = p.region || 'Other';
    if (!regionGroups[r]) regionGroups[r] = [];
    regionGroups[r].push(p);
  });

  if (national.length > 0) {
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `<h2>National Programmes</h2><span class="section-count">${national.length}</span>`;
    list.appendChild(header);
    national.forEach(p => list.appendChild(createCard(p)));
  }

  for (const [regionName, programmes] of Object.entries(regionGroups)) {
    const divider = document.createElement('div');
    divider.className = 'region-divider';
    divider.innerHTML = `${regionName} <span class="section-count">(${programmes.length})</span>`;
    list.appendChild(divider);
    programmes.forEach(p => list.appendChild(createCard(p)));
  }

  if (filtered.length === 0) {
    list.innerHTML = '<p style="color:var(--gray-500);padding:40px 0;">No programmes match this filter.</p>';
  }
}

function createCard(p) {
  const card = document.createElement('div');
  card.className = 'programme-card';

  const rate = p.rate?.display || p.amount?.display || p.rate?.base ? (p.rate.base + '%') : '—';
  const categoryLabel = {
    'cash-rebate': 'Cash Rebate', 'tax-credit': 'Tax Credit', 'grant': 'Grant',
    'selective-fund': 'Selective Fund', 'automatic-fund': 'Automatic', 'loan': 'Loan',
    'co-production-investment': 'Co-Production', 'tax-shelter': 'Tax Shelter', 'equity': 'Equity'
  }[p.category] || p.category || '—';

  const formatLabels = (p.format || []).map(f => f.replace(/-/g, ' ')).join(', ');
  const statusClass = p.status === 'active' ? 'status-active' : p.status === 'suspended' ? 'status-suspended' : '';

  card.innerHTML = `
    <div class="programme-header">
      <div class="programme-name">${p.name}</div>
      <div class="programme-rate">${rate}</div>
    </div>
    <div class="programme-badges">
      <span class="badge category">${categoryLabel}</span>
      ${formatLabels ? `<span class="badge format">${formatLabels}</span>` : ''}
      ${p.status ? `<span class="badge ${statusClass}">${p.status}</span>` : ''}
      ${p.governingBody ? `<span class="badge format">${p.governingBody}</span>` : ''}
    </div>
    <div class="programme-grid">
      ${p.annualBudget?.display ? `<div class="programme-field"><label>Annual Budget</label><div class="value">${p.annualBudget.display}</div></div>` : ''}
      ${p.minSpend?.display ? `<div class="programme-field"><label>Min. Spend</label><div class="value">${p.minSpend.display}</div></div>` : ''}
      ${p.cap?.display ? `<div class="programme-field"><label>Cap</label><div class="value">${p.cap.display}</div></div>` : ''}
      ${p.deadlines?.frequency ? `<div class="programme-field"><label>Deadlines</label><div class="value">${p.deadlines.frequency}</div></div>` : ''}
    </div>
    ${p.eligibility ? `<div class="programme-eligibility">${p.eligibility}</div>` : ''}
    <div class="programme-links">
      ${p.officialUrl ? `<a href="${p.officialUrl}" target="_blank" rel="noopener" class="programme-link">Official Programme Page →</a>` : ''}
      ${p.alternateUrl ? `<a href="${p.alternateUrl}" target="_blank" rel="noopener" class="programme-link">Alternate Source →</a>` : ''}
      ${p.applicationUrl ? `<a href="${p.applicationUrl}" target="_blank" rel="noopener" class="programme-link">Apply →</a>` : ''}
    </div>
  `;
  return card;
}

// Filter tab handlers
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    renderProgrammes(this.dataset.filter);
  });
});

loadCountry();
</script>

</body>
</html>
