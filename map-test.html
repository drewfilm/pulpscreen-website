<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Interactive Europe Map — PULPSCREEN</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0A0A0A;
  --black-card: #111;
  --orange: #FF6B2B;
  --pink: #FF2D7B;
  --gradient: linear-gradient(135deg, #FF6B2B 0%, #FF4757 50%, #FF2D7B 100%);
  --white: #FFFFFF;
  --gray-300: #AAAAAA;
  --gray-500: #666;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--black);
  color: var(--white);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 24px;
}

.header {
  text-align: center;
  margin-bottom: 48px;
}

.header h1 {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 12px;
}

.header p {
  color: var(--gray-300);
  font-size: 16px;
  max-width: 500px;
  margin: 0 auto;
}

/* Map container */
.map-wrap {
  position: relative;
  max-width: 900px;
  margin: 0 auto;
}

.map-wrap svg {
  width: 100%;
  height: auto;
}

/* Country paths */
.map-country {
  fill: #1a1a1a;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 0.5;
  cursor: pointer;
  transition: fill 0.25s, stroke 0.25s;
}

.map-country:hover {
  fill: url(#mapGrad);
  stroke: rgba(255,107,43,0.5);
  stroke-width: 1;
}

.map-bg {
  fill: #0f0f0f;
  stroke: rgba(255,255,255,0.03);
  stroke-width: 0.3;
  pointer-events: none;
}

/* Tooltip */
.map-tooltip {
  position: fixed;
  display: none;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,107,43,0.2);
  border-radius: 8px;
  padding: 10px 16px;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}

.map-tooltip .tt-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 2px;
}

.map-tooltip .tt-rate {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.map-tooltip .tt-type {
  font-size: 11px;
  color: var(--gray-500);
}

/* Legend */
.map-legend {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 24px;
  font-size: 12px;
  color: var(--gray-500);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.legend-swatch {
  width: 14px;
  height: 14px;
  border-radius: 3px;
}

/* Back link */
.back-link {
  display: inline-block;
  margin-top: 40px;
  padding: 12px 28px;
  background: var(--gradient);
  border-radius: 8px;
  color: var(--white);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 700;
}

.back-link:hover { opacity: 0.9; }
</style>
</head>

<script>
const tooltip = document.getElementById('map-tooltip');
const ttName = document.getElementById('tt-name');
const ttRate = document.getElementById('tt-rate');

// Hover
document.querySelectorAll('.map-country').forEach(el => {
  el.addEventListener('mouseenter', function(e) {
    const flag = this.dataset.flag;
    const name = this.dataset.name;
    const rate = this.dataset.rate;
    ttName.textContent = flag + ' ' + name;
    ttRate.textContent = rate === 'N/A' ? 'No national incentive' : 'Incentive rate: ' + rate;
    tooltip.style.display = 'block';
  });

  el.addEventListener('mousemove', function(e) {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });

  el.addEventListener('mouseleave', function() {
    tooltip.style.display = 'none';
  });

  // Touch support
  el.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    const flag = this.dataset.flag;
    const name = this.dataset.name;
    const rate = this.dataset.rate;
    ttName.textContent = flag + ' ' + name;
    ttRate.textContent = rate === 'N/A' ? 'No national incentive' : 'Incentive rate: ' + rate;
    tooltip.style.display = 'block';
    tooltip.style.left = (touch.clientX + 14) + 'px';
    tooltip.style.top = (touch.clientY - 50) + 'px';

    // Auto-hide after 2s on mobile
    setTimeout(() => { tooltip.style.display = 'none'; }, 2000);
  });

  // Click -> go to guide
  el.addEventListener('click', function() {
    const idx = this.dataset.index;
    window.location.href = '/eu-incentive-guide.html#country-' + idx;
  });
});

// Hide tooltip on scroll
window.addEventListener('scroll', () => { tooltip.style.display = 'none'; });
</script>
