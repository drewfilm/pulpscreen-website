<title>Interactive Europe Map — PULPSCREEN</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0A0A0A;
  --orange: #FF6B2B;
  --pink: #FF2D7B;
  --white: #FFFFFF;
  --gray-300: #AAAAAA;
  --gray-500: #666;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--black); color: var(--white); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
.container { max-width: 1000px; margin: 0 auto; padding: 60px 24px; }
.header { text-align: center; margin-bottom: 40px; }
.header h1 { font-family: var(--font-display); font-size: clamp(28px, 4vw, 42px); font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
.header p { color: var(--gray-300); font-size: 16px; max-width: 500px; margin: 0 auto; }
.map-wrap { position: relative; max-width: 850px; margin: 0 auto; }
.map-wrap svg { width: 100%; height: auto; }
.map-country { fill: #222; stroke: rgba(255,107,43,0.25); stroke-width: 0.4; cursor: pointer; transition: fill 0.2s, stroke 0.2s, stroke-width 0.2s; }
.map-country:hover { fill: #FF6B2B; stroke: #FF853F; stroke-width: 0.8; }
.map-bg { fill: #121212; stroke: rgba(255,255,255,0.04); stroke-width: 0.2; pointer-events: none; }
.map-tooltip { position: fixed; display: none; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,107,43,0.25); border-radius: 10px; padding: 12px 18px; pointer-events: none; z-index: 100; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.tt-name { font-family: var(--font-display); font-weight: 700; font-size: 15px; margin-bottom: 3px; }
.tt-rate { font-family: var(--font-mono); font-size: 13px; background: linear-gradient(90deg, #FF6B2B, #FF2D7B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.map-legend { display: flex; justify-content: center; gap: 28px; margin-top: 28px; font-size: 12px; color: var(--gray-500); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
.back-link { display: inline-block; margin-top: 36px; padding: 12px 28px; background: linear-gradient(135deg, #FF6B2B, #FF2D7B); border-radius: 8px; color: var(--white); text-decoration: none; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
.back-link:hover { opacity: 0.9; }

.country-label {
  font-family: var(--font-mono);
  font-size: 3.5px;
  fill: rgba(255,255,255,0.5);
  text-anchor: middle;
  pointer-events: none;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.country-label.small { font-size: 2.8px; }

</style>
</head>

<script>
const tooltip = document.getElementById('map-tooltip');
const ttName = document.getElementById('tt-name');
const ttRate = document.getElementById('tt-rate');
document.querySelectorAll('.map-country').forEach(el => {
  el.addEventListener('mouseenter', function(e) {
    ttName.textContent = this.dataset.flag + ' ' + this.dataset.name;
    ttRate.textContent = this.dataset.rate === 'N/A' ? 'No national incentive' : 'Incentive rate: ' + this.dataset.rate;
    tooltip.style.display = 'block';
  });
  el.addEventListener('mousemove', function(e) {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 12) + 'px';
  });
  el.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
  el.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const t = e.touches[0];
    ttName.textContent = this.dataset.flag + ' ' + this.dataset.name;
    ttRate.textContent = this.dataset.rate === 'N/A' ? 'No national incentive' : 'Incentive rate: ' + this.dataset.rate;
    tooltip.style.display = 'block';
    tooltip.style.left = (t.clientX + 16) + 'px';
    tooltip.style.top = (t.clientY - 50) + 'px';
    setTimeout(() => { tooltip.style.display = 'none'; }, 2500);
  });
  el.addEventListener('click', function() {
    window.location.href = '/eu-incentive-guide.html#country-' + this.dataset.index;
  });
});
window.addEventListener('scroll', () => { tooltip.style.display = 'none'; });
</script>
