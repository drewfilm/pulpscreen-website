<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — PULPSCREEN</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0A0A0A;
  --orange: #FF6B2B;
  --pink: #FF2D7B;
  --gradient: linear-gradient(135deg, #FF6B2B 0%, #FF4757 50%, #FF2D7B 100%);
  --white: #FFFFFF;
  --gray-300: #AAAAAA;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Scanlines overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 10;
}

/* Noise overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 11;
}

.container {
  text-align: center;
  z-index: 5;
  padding: 40px;
}

/* Logo */
.logo {
  margin-bottom: 48px;
}

.logo img {
  height: 36px;
  width: auto;
}

/* Pixel art scene */
.pixel-scene {
  position: relative;
  width: 280px;
  height: 200px;
  margin: 0 auto 48px;
  image-rendering: pixelated;
}

/* Film reel - pixel art */
.reel {
  width: 80px;
  height: 80px;
  border: 8px solid var(--orange);
  border-radius: 50%;
  position: absolute;
  left: 50%;
  top: 30px;
  transform: translateX(-50%);
  animation: reelSpin 3s linear infinite;
}

.reel::before {
  content: '';
  position: absolute;
  inset: 10px;
  border: 4px dashed rgba(255,107,43,0.4);
  border-radius: 50%;
}

.reel::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  background: var(--orange);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

@keyframes reelSpin {
  to { transform: translateX(-50%) rotate(360deg); }
}

/* Film strip */
.film-strip {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
}

.film-frame {
  width: 32px;
  height: 24px;
  border: 3px solid var(--gray-300);
  border-radius: 2px;
  position: relative;
  animation: framePulse 2s ease-in-out infinite;
}

.film-frame:nth-child(1) { animation-delay: 0s; }
.film-frame:nth-child(2) { animation-delay: 0.3s; }
.film-frame:nth-child(3) { animation-delay: 0.6s; }
.film-frame:nth-child(4) { animation-delay: 0.9s; }
.film-frame:nth-child(5) { animation-delay: 1.2s; }

.film-frame::before,
.film-frame::after {
  content: '';
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--gray-300);
  border-radius: 1px;
}

.film-frame::before { top: -6px; left: 50%; transform: translateX(-50%); }
.film-frame::after { bottom: -6px; left: 50%; transform: translateX(-50%); }

@keyframes framePulse {
  0%, 100% { border-color: var(--gray-300); opacity: 0.5; }
  50% { border-color: var(--orange); opacity: 1; }
}

/* Briefcase glow */
.briefcase {
  position: absolute;
  bottom: 60px;
  right: 30px;
  width: 40px;
  height: 30px;
  border: 4px solid #FFD700;
  border-radius: 4px 4px 2px 2px;
  animation: briefcaseGlow 2s ease-in-out infinite alternate;
}

.briefcase::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 6px;
  border: 3px solid #FFD700;
  border-bottom: none;
  border-radius: 3px 3px 0 0;
}

.briefcase::after {
  content: '';
  position: absolute;
  inset: -20px;
  background: radial-gradient(ellipse, rgba(255,215,0,0.15) 0%, transparent 70%);
  border-radius: 50%;
}

@keyframes briefcaseGlow {
  from { filter: drop-shadow(0 0 8px rgba(255,215,0,0.3)); }
  to { filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)); }
}

/* 404 text with glitch */
.error-code {
  font-family: 'Space Mono', monospace;
  font-size: clamp(72px, 12vw, 120px);
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  animation: glitch 3s infinite;
  margin-bottom: 16px;
}

@keyframes glitch {
  0%, 90%, 100% { transform: none; opacity: 1; }
  91% { transform: translate(-3px, 1px) skew(-1deg); opacity: 0.8; }
  92% { transform: translate(3px, -1px) skew(1deg); opacity: 0.9; }
  93% { transform: translate(-2px, 0) skew(0deg); opacity: 0.85; }
  94% { transform: none; opacity: 1; }
}

/* Typewriter message */
.message {
  font-family: 'Space Mono', monospace;
  font-size: clamp(14px, 2vw, 18px);
  color: var(--gray-300);
  letter-spacing: 1px;
  margin-bottom: 12px;
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid var(--orange);
  width: 0;
  animation: typewriter 2s steps(36) 0.5s forwards, blink 0.8s step-end infinite;
  margin-left: auto;
  margin-right: auto;
}

@keyframes typewriter {
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

.sub-message {
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  color: var(--gray-300);
  opacity: 0;
  animation: fadeIn 0.6s 3s forwards;
  margin-bottom: 40px;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* CTA button */
.back-btn {
  display: inline-block;
  padding: 14px 36px;
  background: var(--gradient);
  border-radius: 8px;
  color: var(--white);
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  font-weight: 700;
  transition: opacity 0.3s, transform 0.3s;
  opacity: 0;
  animation: fadeIn 0.6s 3.5s forwards;
}

.back-btn:hover {
  opacity: 0.9 !important;
  transform: translateY(-2px);
}

/* VHS tracking lines */
.tracking {
  position: fixed;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, transparent, rgba(255,107,43,0.15), transparent);
  animation: tracking 8s linear infinite;
  z-index: 8;
  pointer-events: none;
}

@keyframes tracking {
  0% { top: -6px; }
  100% { top: 100vh; }
}

.tracking:nth-child(2) { animation-delay: -3s; height: 3px; }
.tracking:nth-child(3) { animation-delay: -6s; height: 2px; opacity: 0.5; }
</style>
</head>
<body>

<!-- VHS tracking lines -->
<div class="tracking"></div>
<div class="tracking"></div>
<div class="tracking"></div>

<div class="container">
  <div class="logo">
    <a href="/">
      <img src="images/Asset 3@5x.png" alt="Pulpscreen"
           onerror="this.outerHTML='<div style=\'font-weight:900;font-size:24px;letter-spacing:4px;background:linear-gradient(90deg,#FF6B2B,#FF2D7B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;\'>PULPSCREEN</div>'">
    </a>
  </div>

  <div class="pixel-scene">
    <div class="reel"></div>
    <div class="briefcase"></div>
    <div class="film-strip">
      <div class="film-frame"></div>
      <div class="film-frame"></div>
      <div class="film-frame"></div>
      <div class="film-frame"></div>
      <div class="film-frame"></div>
    </div>
  </div>

  <div class="error-code">404</div>

  <div style="display:inline-block; max-width:100%; overflow:hidden;">
    <div class="message">This scene didn't make the final cut.</div>
  </div>

  <div class="sub-message">The reel you're looking for has gone missing in post-production.</div>

  <a href="/" class="back-btn">Back to Homepage →</a>
</div>

</body>
</html>
