<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>404 — PULPSCREEN</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0A0A0A;
  --orange: #FF6B2B;
  --pink: #FF2D7B;
  --gradient: linear-gradient(135deg, #FF6B2B 0%, #FF4757 50%, #FF2D7B 100%);
  --white: #FFFFFF;
  --gray-300: #AAAAAA;
  --amber: #FFB347;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
  pointer-events: none;
  z-index: 10;
}

/* Noise */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 11;
}

/* Vignette */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 9;
}

/* Warm amber ambient glow */
.ambient {
  position: fixed;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(255,179,71,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

.container {
  text-align: center;
  z-index: 5;
  padding: 20px;
  max-width: 600px;
}

/* Logo */
.logo { margin-bottom: 32px; }
.logo img { height: 32px; width: auto; }

/* ===== EDITING MACHINE SCENE ===== */
.scene {
  position: relative;
  width: 380px;
  height: 280px;
  margin: 0 auto 36px;
}

/* Steenbeck editing machine body */
.machine {
  position: absolute;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  width: 240px;
  height: 100px;
  background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
  border-radius: 6px 6px 2px 2px;
  border: 1px solid #333;
}

/* Machine screen */
.machine-screen {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 72px;
  height: 52px;
  background: #111;
  border: 2px solid #444;
  border-radius: 3px;
  overflow: hidden;
}

.machine-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,179,71,0.08) 0%, rgba(255,107,43,0.04) 50%, rgba(0,0,0,0.3) 100%);
  animation: screenFlicker 4s ease-in-out infinite;
}

@keyframes screenFlicker {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
  85% { opacity: 0.9; }
  86% { opacity: 0.3; }
  87% { opacity: 1; }
}

/* Machine control knobs */
.machine-knobs {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
}

.knob {
  width: 14px;
  height: 14px;
  background: radial-gradient(circle at 40% 35%, #555, #222);
  border-radius: 50%;
  border: 1px solid #444;
}

.knob:nth-child(2) { width: 18px; height: 18px; }

/* Machine base/legs */
.machine-base {
  position: absolute;
  bottom: 86px;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 8px;
  background: #222;
  border-radius: 0 0 3px 3px;
}

/* Film reels on top of machine */
.reel {
  position: absolute;
  width: 56px;
  height: 56px;
  border: 5px solid #888;
  border-radius: 50%;
  top: 80px;
  animation: reelSpin 2.5s linear infinite;
}

.reel::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 3px dashed rgba(136,136,136,0.3);
  border-radius: 50%;
}

.reel::after {
  content: '';
  position: absolute;
  width: 10px;
  height: 10px;
  background: #666;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.reel-left { left: 80px; }
.reel-right { right: 80px; animation-direction: reverse; }

@keyframes reelSpin {
  to { transform: rotate(360deg); }
}

/* Film strip threading through machine */
.film-thread {
  position: absolute;
  top: 108px;
  left: 115px;
  width: 150px;
  height: 24px;
  display: flex;
  gap: 2px;
  overflow: hidden;
}

.film-cell {
  flex-shrink: 0;
  width: 18px;
  height: 14px;
  border: 2px solid var(--orange);
  border-radius: 1px;
  margin-top: 5px;
  opacity: 0.7;
  animation: filmScroll 3s linear infinite;
}

@keyframes filmScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-20px); }
}

/* Film trailing off machine onto table */
.film-trail {
  position: absolute;
  bottom: 60px;
  right: 60px;
  width: 100px;
  height: 30px;
  border-bottom: 3px solid var(--orange);
  border-right: 3px solid var(--orange);
  border-radius: 0 0 20px 0;
  opacity: 0.5;
}

/* ===== TABLE WITH PULP MAGAZINES ===== */
.table-surface {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(180deg, #1a1410 0%, #12100c 100%);
  border-top: 2px solid #2a2218;
  border-radius: 2px;
}

/* Scattered magazines */
.magazine {
  position: absolute;
  border-radius: 2px;
  overflow: hidden;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.magazine .mag-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  line-height: 1;
  text-align: center;
}

.mag-1 {
  width: 52px;
  height: 68px;
  background: linear-gradient(160deg, #c0392b, #8e1a1a);
  bottom: 8px;
  left: 30px;
  transform: rotate(-12deg);
}
.mag-1 .mag-title { font-size: 7px; color: #FFD700; letter-spacing: 2px; }
.mag-1::after {
  content: '';
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 22px;
  background: rgba(0,0,0,0.3);
  border-radius: 2px;
}

.mag-2 {
  width: 48px;
  height: 62px;
  background: linear-gradient(145deg, #d4a017, #8B6914);
  bottom: 12px;
  left: 90px;
  transform: rotate(5deg);
}
.mag-2 .mag-title { font-size: 6px; color: #000; letter-spacing: 1.5px; }

.mag-3 {
  width: 44px;
  height: 58px;
  background: linear-gradient(135deg, #1a5276, #0d2f44);
  bottom: 6px;
  right: 70px;
  transform: rotate(-4deg);
}
.mag-3 .mag-title { font-size: 6px; color: var(--orange); letter-spacing: 1px; }

.mag-4 {
  width: 50px;
  height: 64px;
  background: linear-gradient(150deg, #633974, #3d1f4e);
  bottom: 10px;
  right: 20px;
  transform: rotate(8deg);
}
.mag-4 .mag-title { font-size: 5.5px; color: #FFB347; letter-spacing: 1px; }

/* Magazine hover glow */
.magazine::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 3px;
  opacity: 0;
  background: var(--gradient);
  z-index: -1;
  transition: opacity 0.3s;
}

/* ===== TEXT ===== */
.error-code {
  font-family: 'Space Mono', monospace;
  font-size: clamp(64px, 12vw, 110px);
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: glitch 3s infinite;
  margin-bottom: 12px;
  line-height: 1;
}

@keyframes glitch {
  0%, 90%, 100% { transform: none; opacity: 1; }
  91% { transform: translate(-3px, 1px) skew(-1deg); opacity: 0.8; }
  92% { transform: translate(3px, -1px) skew(1deg); opacity: 0.9; }
  93% { transform: translate(-2px, 0); opacity: 0.85; }
  94% { transform: none; opacity: 1; }
}

.message {
  font-family: 'Space Mono', monospace;
  font-size: clamp(13px, 2vw, 17px);
  color: var(--gray-300);
  letter-spacing: 1px;
  margin-bottom: 10px;
  overflow: hidden;
  white-space: nowrap;
  border-right: 2px solid var(--orange);
  width: 0;
  animation: typewriter 2s steps(40) 0.5s forwards, blink 0.8s step-end infinite;
  margin-left: auto;
  margin-right: auto;
}

@keyframes typewriter { to { width: 100%; } }
@keyframes blink { 50% { border-color: transparent; } }

.sub-message {
  font-size: 14px;
  color: var(--gray-300);
  opacity: 0;
  animation: fadeIn 0.6s 3s forwards;
  margin-bottom: 32px;
}

@keyframes fadeIn { to { opacity: 1; } }

.back-btn {
  display: inline-block;
  padding: 13px 32px;
  background: var(--gradient);
  border-radius: 8px;
  color: var(--white);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  font-weight: 700;
  transition: opacity 0.3s, transform 0.3s;
  opacity: 0;
  animation: fadeIn 0.6s 3.5s forwards;
}

.back-btn:hover { opacity: 0.9 !important; transform: translateY(-2px); }

/* VHS tracking */
.tracking {
  position: fixed;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, transparent, rgba(255,107,43,0.12), transparent);
  animation: tracking 8s linear infinite;
  z-index: 8;
  pointer-events: none;
}

@keyframes tracking { 0% { top: -6px; } 100% { top: 100vh; } }
.tracking:nth-child(2) { animation-delay: -3s; height: 3px; }
.tracking:nth-child(3) { animation-delay: -6s; height: 2px; opacity: 0.5; }

/* Responsive */
@media (max-width: 440px) {
  .scene { width: 300px; height: 240px; transform: scale(0.85); }
  .mag-1 { left: 10px; }
  .mag-4 { right: 5px; }
}
</style>
</head>
<body>

<div class="vignette"></div>
<div class="ambient"></div>
<div class="tracking"></div>
<div class="tracking"></div>
<div class="tracking"></div>

<div class="container">
  <div class="logo">
    <a href="/">
      <img src="images/Asset 3@5x.png" alt="Pulpscreen"
           onerror="this.outerHTML='<div style=\'font-weight:900;font-size:24px;letter-spacing:4px;background:linear-gradient(90deg,#FF6B2B,#FF2D7B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;\'>PULPSCREEN</div>'">
    </a>
  </div>

  <!-- Editing machine scene -->
  <div class="scene">
    <!-- Film reels -->
    <div class="reel reel-left"></div>
    <div class="reel reel-right"></div>

    <!-- Film threading through -->
    <div class="film-thread">
      <div class="film-cell"></div>
      <div class="film-cell"></div>
      <div class="film-cell"></div>
      <div class="film-cell"></div>
      <div class="film-cell"></div>
      <div class="film-cell"></div>
      <div class="film-cell"></div>
      <div class="film-cell"></div>
    </div>

    <!-- Steenbeck machine -->
    <div class="machine">
      <div class="machine-screen"></div>
      <div class="machine-knobs">
        <div class="knob"></div>
        <div class="knob"></div>
        <div class="knob"></div>
      </div>
    </div>
    <div class="machine-base"></div>

    <!-- Film trailing onto table -->
    <div class="film-trail"></div>

    <!-- Table with pulp magazines -->
    <div class="table-surface">
      <div class="magazine mag-1"><span class="mag-title">Pulp<br>Cinema</span></div>
      <div class="magazine mag-2"><span class="mag-title">Film<br>Noir</span></div>
      <div class="magazine mag-3"><span class="mag-title">Reel<br>Talk</span></div>
      <div class="magazine mag-4"><span class="mag-title">Screen<br>Pulp</span></div>
    </div>
  </div>

  <div class="error-code">404</div>

  <div style="display:inline-block; max-width:100%; overflow:hidden;">
    <div class="message">This reel never made it through the edit.</div>
  </div>

  <div class="sub-message">Somewhere between the cutting room and the screen, this page got lost.</div>

  <a href="/" class="back-btn">Back to Homepage</a>
</div>

</body>
</html>
